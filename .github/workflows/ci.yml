name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_productivity_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ai_productivity_hub_test
          JWT_SECRET: test-jwt-secret-key
          NODE_ENV: test
        run: npm test

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          CI: true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for syntax errors (backend)
        working-directory: backend
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          function checkDir(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              const full = path.join(dir, file);
              if (fs.statSync(full).isDirectory() && file !== 'node_modules') {
                checkDir(full);
              } else if (file.endsWith('.js')) {
                try { require(full); } catch(e) {
                  if (e instanceof SyntaxError) { console.error('Syntax error:', full, e.message); process.exit(1); }
                }
              }
            }
          }
          checkDir('.');
          console.log('No syntax errors found');
          "
